stages:
  - lint
  - test
  - build
  - deploy

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  PYTHON_VERSION: "3.12"


lint:
  stage: lint
  image: python:3.12
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  script:
    - pip install -r requirements.txt black isort flake8 mypy
    - black --check .
    - isort --check-only .
    - flake8 .
    - mypy app
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"


test:
  stage: test
  image: python:3.12
  needs: [lint]
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    DATABASE_URL: postgresql+asyncpg://$POSTGRES_USER:$POSTGRES_PASSWORD@postgres:5432/$POSTGRES_DB
    CELERY_BROKER_URL: amqp://$RABBITMQ_USER:$RABBITMQ_PASSWORD@rabbitmq:5672//
    CELERY_RESULT_BACKEND: $CELERY_RESULT_BACKEND
    S3_ENDPOINT_URL: $S3_ENDPOINT_URL
    S3_ACCESS_KEY: $MINIO_ACCESS_KEY
    S3_SECRET_KEY: $MINIO_SECRET_KEY
    S3_BUCKET_NAME: $S3_BUCKET_NAME
    INGESTION_INTERVAL_SECONDS: $INGESTION_INTERVAL_SECONDS
    TASKS_API_URL: $TASKS_API_URL
    METRICS_API_URL: $METRICS_API_URL
  services:
    - name: postgres:15-alpine
      alias: postgres
      variables:
        POSTGRES_USER: $POSTGRES_USER
        POSTGRES_PASSWORD: $POSTGRES_PASSWORD
        POSTGRES_DB: $POSTGRES_DB
    - name: rabbitmq:3-alpine
      alias: rabbitmq
  before_script:
    - pip install -r requirements-dev.txt
  script:
    - pytest --cov=app --cov-report=xml -v
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"


build:
  stage: build
  image: docker:26
  needs: [test]
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"


deploy:
  stage: deploy
  image: docker:26
  needs: [build]
  variables:
    DEPLOY_DIR: "$CI_PROJECT_DIR"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - mkdir -p "$DEPLOY_DIR"
    - printf '%s\n' "$ENV_FILE" > "$DEPLOY_DIR/.env"
  script:
    - cd "$DEPLOY_DIR"
    - docker compose pull
    - docker compose up -d --build --remove-orphans
    - docker compose exec -T app alembic upgrade head
  environment:
    name: production
    url: http://$DEPLOY_HOST
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
